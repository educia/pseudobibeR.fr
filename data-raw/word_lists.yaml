# ---------------------------------------------------------------------------
# SUFIJOS DE NOMINALIZACION (f_60)
# Biber (1988): nouns ending in -tion, -ment, -ness, -ity.
# En espanol los patrones equivalentes son morfologicamente ricos.
#
# IMPLEMENTACION: block_nominalizations_es() busca tokens con
# upos == "NOUN" cuyo form (en minusc.) termina en alguno de estos
# sufijos Y no esta en nominalization_stoplist.
# Los sufijos se listan sin la vocal tematica variable; el codigo
# debe usar endsWith() o regex ("(sufijo)s?$") para cubrir plurales.
# ---------------------------------------------------------------------------

nominalization_suffixes:
  # Equivalentes de -tion / -sion
  - cion      # -cion  -> accion, relacion, comunicacion
  - ción      # con tilde
  - ciones    # plural
  - ciónes    # plural con tilde (forma no normativa pero presente en corpus)
  - sion      # -sion  -> extension, confusion
  - sión
  - siones
  - siónes
  - xion      # -xion  -> conexion, reflexion (variante ortografica)
  - xión
  - xiones
  # Equivalentes de -ment
  - miento    # -miento -> pensamiento, conocimiento, procedimiento
  - mientos
  - mento     # -mento  -> argumento, documento, elemento
  - mentos
  - menta     # -menta  -> herramienta, pimienta (semilexicalizados)
  - mentas
  # Equivalentes de -ness / -ity
  - dad       # -dad   -> capacidad, libertad, sociedad
  - dades
  - tad       # -tad   -> voluntad, facultad, lealtad
  - tades
  - tud       # -tud   -> actitud, aptitud, virtud
  - tudes
  - itud      # -itud  -> exactitud, similitud, magnitud
  - itudes
  - dumbre    # -dumbre -> incertidumbre, servidumbre
  - dumbres
  # Equivalentes de -ness (cualidad)
  - ncia      # -ncia  -> inteligencia, violencia, tendencia
  - ncias
  - ncia      # ya incluido
  - nza       # -nza   -> confianza, esperanza, enseñanza
  - nzas
  # Sufijos de agente/proceso
  - ura       # -ura   -> estructura, temperatura, literatura
  - uras
  - tura      # -tura  -> lectura, escritura, ruptura
  - turas
  - dura      # -dura  -> herida (poco productivo)
  - duras
  # Sufijos de accion / resultado
  - aje       # -aje   -> aprendizaje, porcentaje, lenguaje
  - ajes
  - ado       # -ado   -> resultado, estado, tratado (nominaliz. de part.)
  - ados
  - ada       # -ada   -> llegada, entrada, jugada
  - adas
  - ido       # -ido   -> sonido, pedido, partido
  - idos
  - ida       # -ida   -> salida, caida, herida
  - idas
  # Sufijos de cualidad
  - ez        # -ez    -> sencillez, estrechez, vejez
  - eza       # -eza   -> naturaleza, riqueza, pobreza
  - ezas
  - ia        # -ia    -> democracia, filosofia, teoria
  - ía
  - ias
  - ías
  - ismo      # -ismo  -> capitalismo, realismo, comunismo
  - ismos

# Sustantivos que terminan en sufijo de nominalizacion pero son
