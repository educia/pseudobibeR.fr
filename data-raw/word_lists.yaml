# ---------------------------------------------------------------------------
# COORDINADORES (f_64–f_67 coordinacion y negacion)
# ---------------------------------------------------------------------------

coordinating_conjunctions:
  # Conjunciones coordinantes copulativas
  copulative:
    - y
    - e  # ante i-, hi-
    - ni
    - que  # copulativa en estructuras binarias: "dale que dale"
  # Disyuntivas
  disjunctive:
    - o
    - u  # ante o-, ho-
    - o_bien
    - ya_sea
    - ya_sea_que
    - bien_sea
  # Adversativas
  adversative:
    - pero
    - sino
    - sino_que
    - mas   # literario: equivalent de 'pero'
    - más   # cuidado: puede ser adverbio comparativo
    - aunque  # coordinante cuando va con indicativo
    - sin_embargo  # no conjuncion pero funciona como nexo coordinante
    - no_obstante
  # Causales coordinantes
  causal_coord:
    - pues   # pospuesto: "estaba cansado, pues habia caminado mucho"
    - porque  # coordinante en registro coloquial
  # Consecutivas coordinantes
  consecutive:
    - conque
    - luego   # silogistico: "pienso, luego existo"
    - asi_que  # coloquial
    - de_modo_que
    - de_manera_que
    - de_forma_que

