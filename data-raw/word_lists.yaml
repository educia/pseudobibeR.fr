# Spanish word lists for pseudobibeR.es feature extraction
#
# TOKENIZATION AND PATTERN FORMATTING:
#
# Patterns use underscores for token boundaries, following pseudobibeR conventions:
#   - Multiword: "por ejemplo" → "por_ejemplo"
#   - Clitic sequences: "darse cuenta" → "darse_cuenta"
#   - Keep entries in lower case; matching may occur over lemmas or
#     surface forms depending on the feature.
#

pronoun_matchlist:
  - yo
  - tu
  - tú
  - vos
  - usted
  - ustedes
  - el
  - él
  - ella
  - ellas
  - ellos
  - ello
  - nosotros
  - nosotras
  - mi
  - mis
  - mio
  - mío
  - mia
  - mía
  - nuestro
  - nuestra
  - nuestros
  - nuestras
  - tuyo
  - tuya
  - tuyos
  - tuyas
  - suyo
  - suya
  - suyos
  - suyas
  - me
  - te
  - se
  - nos
  - os
  - si
  - sí
  - uno
  - una
  - uno_mismo
  - una_misma
  - cada_uno
  - cada_una
  - cualquiera
  - alguien
  - nadie
  - todo_el_mundo

proverb_object_pronouns:
  # Direct and indirect object clitics commonly used with hacer as pro-verb
  - lo
  - la
  - los
  - las
  - le
  - les

impersonal_verbs:
  # Verbs that typically occur in impersonal constructions
  - llover
  - nevar
  - granizar
  - tronar
  - amanecer
  - anochecer
  - haber  # hay, había, hubo, habrá, etc.
  - hacer  # hace_frio, hace_calor

linking_matchlist:
  # Copular / linking verbs in Spanish
  - ser
  - estar
  - parecer
  - resultar
  - volverse
  - quedarse

verb_matchlist:
  # Public / private / suasive verbs used by multiple feature families;
  # this list mirrors dict$f_55_verb_public, f_56_verb_private, and
  # f_57_verb_suasive but is kept separate for generic verb pattern logic.
  - afirmar
  - anunciar
  - declarar
  - explicar
  - informar
  - mencionar
  - proclamar
  - prometer
  - protestar
  - relatar
  - contar
  - señalar
  - reconocer
  - creer
  - asumir
  - conocer
  - comprender
  - considerar
  - darse_cuenta
  - dudar
  - entender
  - esperar
  - imaginar
  - notar
  - olvidar
  - pensar
  - recordar
  - saber
  - suponer
  - aconsejar
  - advertir
  - animar
  - convencer
  - exigir
  - mandar
  - ordenar
  - pedir
  - proponer
  - recomendar
  - rogar
  - sugerir

nominalization_stoplist:
  # Spanish nouns ending in typical nominalization suffixes but
  # functioning as lexicalized items, to avoid over-counting.
  # Extend this list based on corpus inspection.
  - avion
  - avión
  - camion
  - camión
  - leon
  - león
  - jamon
  - jamón
  - patron
  - patrón
  - melon
  - melón
  - camion
  - camión
  - razon
  - razón

gerund_stoplist:
  # Lexical items ending in -ando / -iendo that are not gerunds
  # in Spanish, or are highly lexicalized.
  - cuando
  - hablando  # as noun/title
  - viviendo   # as noun/title
  - destacando # as noun/title in some contexts

nominalization_suffixes:
  # Common Spanish nominalization suffixes; used to detect
  # candidate nominalizations when combined with POS/morphology.
  - cion
  - ciones
  - sion
  - siones
  - miento
  - mientos
  - dad
  - dades
  - tud
  - tudes
  - ncia
  - ncias
  - ura
  - uras
  - aje
  - ajes
  - ez
  - eza
  - ezas

multiword_patterns:
  # Common multiword expressions used by various features
  - por_ejemplo
  - en_cambio
  - por_otro_lado
  - por_otra_parte
  - en_resumen
  - en_suma
  - sin_embargo
  - no_obstante
  - tal_vez
  - en_cierto_modo
  - en_parte
