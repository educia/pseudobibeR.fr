# ---------------------------------------------------------------------------
# SUFIJOS DERIVATIVOS — DENSIDAD LEXICA (f_61–f_64)
#
# Biber (1988) mide cuatro tipos de complejidad morfoléxica:
#   f_61 type/token ratio (TTR)          -> calculado en codigo, sin lista
#   f_62 word length (media de caracteres) -> calculado en codigo, sin lista
#   f_63 words with -ly suffix            -> equivalentes en espanol:
#          adverbios en -mente
#   f_64 words >= 6 letters               -> calculado en codigo, sin lista
#
# Para f_63 en espanol se usa la terminacion -mente como proxy del
# sufijo adverbial derivativo productivo. Se detecta via endsWith();
# la lista de exclusiones evita adverbios lexicalizados no formados
# por adjetivo + -mente productivo.
# ---------------------------------------------------------------------------

adverb_mente_stoplist:
  # Adverbios en -mente altamente lexicalizados que no reflejan
  # derivacion productiva adjetivo -> adverbio y por tanto NO
  # deben contarse en f_63.
  - mente       # la palabra "mente" por si sola
  - solamente   # <- opcionalmente excluir; funciona como foco, no como RR
  - unicamente
  - únicamente
  - simplemente
  - meramente
  - puramente
  - realmente    # muy frecuente; debatible si excluir
  - verdaderamente
  - exactamente
  - precisamente
  - justamente
  - actualmente  # temporal, no derivado adjetival prototipico
  - anteriormente
  - posteriormente
  - finalmente
  - ultimamente
  - últimamente
  - primeramente
  - primeramente
  - nuevamente   # "de nuevo" -> muy lexicalizado
  - nuevamente
  - tampoco      # no termina en -mente; incluido por error historico

