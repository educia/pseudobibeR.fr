# Spanish word lists for pseudobibeR.es feature extraction
#
# TOKENIZATION AND PATTERN FORMATTING:
#
# Patterns use underscores for token boundaries, following pseudobibeR conventions:
#   - Multiword: "por ejemplo" -> "por_ejemplo"
#   - Clitic sequences: "darse cuenta" -> "darse_cuenta"
#   - Keep entries in lower case; matching may occur over lemmas or
#     surface forms depending on the feature.
#
# FUENTES:
#   Biber, D. (1988). Variation across speech and writing. Cambridge UP.
#   Real Academia Espanola (2009). Nueva gramatica de la lengua espanola.
#   Lang, M. F. (1990). Spanish word formation. Routledge.
#   Alvar Ezquerra, M. (1993). La formacion de palabras en espanol. Arco Libros.

