# French linguistic feature dictionaries for Biber (1985) framework
#
# TOKENIZATION AND PATTERN FORMATTING:
# French elisions (d', l', n', t', m', s') are handled specially:
# 1. udpipe splits elisions: "d'ici" → ["d'", "ici"]
# 2. Text reconstruction adds spaces: paste() → "d' ici"
# 3. quanteda re-tokenizes and splits apostrophes: "d' ici" → ["d", "'", "ici"]
# 4. Patterns use underscores for token boundaries:
#    - Multiword: "loin d'ici" → "loin_d_'_ici" (matches ["loin", "d", "'", "ici"])
#    - Single token: "t'" → "t_'" (matches ["t", "'"])
#
# KNOWN LIMITATIONS:
# - Some items appear in multiple categories and may be counted twice:
#   * donc: f_45_conjuncts AND f_50_discourse_particles
#   * ensuite: f_05_time_adverbials AND f_45_conjuncts
#   * vraiment: f_48_amplifiers AND f_49_emphatics
#   * devoir: f_53_modal_necessity AND f_54_modal_predictive
#   * risquer: f_52_modal_possibility AND f_54_modal_predictive
# - Future enhancement: contextual disambiguation based on syntactic position
#
