# Modals rely on lemma matching via dictionary_to_lemmas()/block_modals_fr(),
# so keep entries in infinitive form even if downstream logic also inspects context.
f_52_modal_possibility:
  - pouvoir
  # sembler assigned to f_58_verb_seem
f_53_modal_necessity:
  - devoir  # Primary meaning; predictive uses ("il doit être 5h") assigned here
  - falloir
f_54_modal_predictive:
  # Pattern-based detection in block_modals_fr() - no dictionary entries needed
  # Captures: aller + inf, sera/serait, risquer de + inf, être susceptible de + inf
  # Adding lemmas here would cause double-counting with pattern logic
